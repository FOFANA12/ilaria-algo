<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ilaria-algo — ilaria Digital School</title>
    <style>
      :root {
        --corail: #ff5a5f;
        --corail-clair: #ff8a8d;
        --nuit: #1b2233;
        --nuit-fonce: #161c2b;
        --vert: #27ae60;
        --bleu: #2d9cdb;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--nuit-fonce);
        color: #e6e6e6;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }
      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 20px;
        background: var(--nuit);
        border-bottom: 3px solid var(--corail);
        flex-wrap: wrap;
      }
      header h1 { font-size: 20px; margin: 0; letter-spacing: 0.5px; }
      header h1 .accent { color: var(--corail); }
      header .subtitle { font-size: 12px; color: #8a97ad; margin-left: -8px; }
      .toolbar { margin-left: auto; display: flex; align-items: center; gap: 10px; }
      label { font-size: 13px; color: #b6c0d4; }
      select {
        background: var(--nuit-fonce); color: #e6e6e6;
        border: 1px solid #33405e; border-radius: 6px;
        padding: 6px 10px; font-size: 13px;
      }
      button {
        font-size: 13px; font-weight: 600; cursor: pointer;
        border: none; border-radius: 6px; padding: 7px 14px;
        transition: filter .15s ease, opacity .15s;
      }
      button:hover { filter: brightness(1.1); }
      button:disabled { opacity: .45; cursor: not-allowed; }
      .btn-ghost { background: #2a3447; color: #e6e6e6; }
      .btn-analyse { background: var(--bleu); color: #fff; }
      .btn-run { background: var(--corail); color: #fff; }
      .btn-stop { background: #6b3030; color: #ffd9d9; }

      main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
      #editor { flex: 1; overflow: hidden; min-height: 0; }
      .cm-editor { height: 100%; }

      .console {
        height: 38%;
        min-height: 140px;
        background: #0f1420;
        border-top: 2px solid #2a3447;
        display: flex; flex-direction: column;
      }
      .console__bar {
        display: flex; align-items: center; gap: 10px;
        padding: 6px 14px; background: var(--nuit);
        border-bottom: 1px solid #2a3447;
        font-size: 12px; color: #8a97ad; text-transform: uppercase;
        letter-spacing: .6px;
      }
      .console__bar button { padding: 3px 10px; font-size: 11px; }
      .console__out {
        flex: 1; overflow-y: auto; padding: 10px 14px;
        font-family: 'JetBrains Mono','Fira Code','SF Mono',Menlo,monospace;
        font-size: 13.5px; line-height: 1.55; white-space: pre-wrap;
      }
      .line-output { color: #d6e0f0; }
      .line-input  { color: var(--corail-clair); }
      .line-error  { color: var(--corail); font-weight: 600; }
      .line-info   { color: #7a879b; font-style: italic; }
      .line-ok     { color: var(--vert); font-weight: 600; }

      .console__input {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 14px; border-top: 1px solid #2a3447; background: #0c111c;
      }
      .console__input .prompt { color: var(--corail); font-weight: 700; }
      .console__input input {
        flex: 1; background: transparent; border: none; outline: none;
        color: #e6e6e6; font-family: 'JetBrains Mono',monospace; font-size: 13.5px;
      }
      .console__input input:disabled { color: #4d5870; }

      footer {
        padding: 7px 20px; background: var(--nuit);
        border-top: 1px solid #2a3447; font-size: 13px;
      }
      .status--ok { color: var(--vert); }
      .status--error { color: var(--corail); font-weight: 600; }

      /* ---- Modale documentation ---- */
      .doc-modal { position: fixed; inset: 0; z-index: 100; display: flex;
        align-items: center; justify-content: center; }
      .doc-modal[hidden] { display: none; }
      .doc-modal__backdrop { position: absolute; inset: 0;
        background: rgba(0,0,0,.55); backdrop-filter: blur(2px); }
      .doc-modal__panel {
        position: relative; width: min(900px, 92vw); height: min(82vh, 900px);
        display: flex; flex-direction: column;
        background: var(--nuit-fonce); border: 1px solid #33405e;
        border-top: 3px solid var(--corail); border-radius: 10px;
        box-shadow: 0 20px 60px rgba(0,0,0,.5); overflow: hidden;
      }
      .doc-modal__bar {
        display: flex; align-items: center; gap: 12px;
        padding: 8px 12px; background: var(--nuit); border-bottom: 1px solid #2a3447;
      }
      .doc-tabs { display: flex; gap: 6px; margin-right: auto; }
      .doc-tab {
        background: #2a3447; color: #b6c0d4; padding: 6px 14px; border-radius: 6px;
      }
      .doc-tab.is-active { background: var(--corail); color: #fff; }
      .doc-content { flex: 1; overflow-y: auto; padding: 8px 26px 28px; }

      /* ---- Styles du Markdown rendu ---- */
      .markdown-body { color: #d6e0f0; line-height: 1.6; font-size: 14.5px; }
      .markdown-body h1, .markdown-body h2, .markdown-body h3 {
        color: #fff; line-height: 1.3; margin: 1.4em 0 .5em; }
      .markdown-body h1 { font-size: 24px; border-bottom: 2px solid var(--corail); padding-bottom: .3em; }
      .markdown-body h2 { font-size: 20px; border-bottom: 1px solid #2a3447; padding-bottom: .25em; }
      .markdown-body h3 { font-size: 16px; }
      .markdown-body a { color: var(--bleu); }
      .markdown-body .doc-link { color: var(--corail-clair); }
      .markdown-body .doc-download {
        color: var(--vert); font-weight: 600; text-decoration: none;
        border: 1px solid var(--vert); border-radius: 6px; padding: 1px 8px;
      }
      .markdown-body .doc-download:hover { background: #27ae6022; }
      .markdown-body strong { color: #fff; }
      .markdown-body code {
        font-family: 'JetBrains Mono','Fira Code',Menlo,monospace; font-size: .88em;
        background: #0f1420; border: 1px solid #2a3447; border-radius: 4px;
        padding: 1px 5px; color: #ffd9d9;
      }
      .markdown-body pre {
        background: #0f1420; border: 1px solid #2a3447; border-radius: 8px;
        padding: 12px 14px; overflow-x: auto;
      }
      .markdown-body pre code { background: none; border: none; padding: 0; color: #d6e0f0; }
      .markdown-body blockquote {
        margin: .8em 0; padding: .4em 14px; border-left: 3px solid var(--corail);
        background: #1b223344; color: #b6c0d4;
      }
      .markdown-body ul { padding-left: 1.4em; }
      .markdown-body li { margin: .25em 0; }
      .markdown-body hr { border: none; border-top: 1px solid #2a3447; margin: 1.4em 0; }
      .markdown-body table {
        border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 13.5px;
      }
      .markdown-body th, .markdown-body td {
        border: 1px solid #2a3447; padding: 6px 10px; text-align: left; vertical-align: top;
      }
      .markdown-body th { background: var(--nuit); color: #fff; }
      .markdown-body tr:nth-child(even) td { background: #161c2b55; }
    </style>
  </head>
  <body>
    <header>
      <h1><span class="accent">ilaria</span>-algo</h1>
      <span class="subtitle">ilaria Digital School · pseudo-code</span>
      <div class="toolbar">
        <button id="btn-help" class="btn-ghost" title="Aide et documentation">📖 Aide</button>
        <label for="examples">Exemple :</label>
        <select id="examples"></select>
        <button id="btn-new" class="btn-ghost" title="Nouvel algorithme">＋ Nouveau</button>
        <button id="btn-format" class="btn-ghost" title="Réindenter le code (Maj+Alt+F)">⤷ Formater</button>
        <button id="btn-analyse" class="btn-analyse">Analyser</button>
        <button id="btn-run" class="btn-run">▶ Exécuter</button>
        <button id="btn-stop" class="btn-stop" disabled>■ Arrêter</button>
      </div>
    </header>

    <main>
      <div id="editor"></div>
      <section class="console">
        <div class="console__bar">
          <span>Console</span>
          <button id="btn-clear" class="btn-ghost">Effacer</button>
        </div>
        <div id="console-out" class="console__out"></div>
        <div class="console__input">
          <span class="prompt">»</span>
          <input id="console-in" type="text" placeholder="La saisie (Lire) s'activera ici pendant l'exécution…" disabled />
        </div>
      </section>
    </main>

    <footer>
      <span id="status" class="status status--ok">Prêt.</span>
    </footer>

    <div id="doc-modal" class="doc-modal" hidden>
      <div class="doc-modal__backdrop" data-close></div>
      <div class="doc-modal__panel" role="dialog" aria-modal="true" aria-label="Documentation">
        <div class="doc-modal__bar">
          <div class="doc-tabs">
            <button class="doc-tab is-active" data-doc="antiseche">Antisèche</button>
            <button class="doc-tab" data-doc="readme">Guide</button>
            <button class="doc-tab" data-doc="biblio">Bibliothèque math</button>
          </div>
          <button id="doc-close" class="btn-ghost" data-close title="Fermer (Échap)">✕ Fermer</button>
        </div>
        <div id="doc-content" class="doc-content markdown-body"></div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
